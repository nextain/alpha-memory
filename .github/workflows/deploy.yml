name: Deploy Services

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Required to push images to GitHub Container Registry

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build and push alpha-memory-service
      - name: Build and push Alpha Memory Service image
        id: build-memory-service
        uses: docker/build-push-action@v5
        with:
          context: ./memory-service
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/alpha-memory-service:latest

      # Build and push api-server
      - name: Build and push API Server image
        id: build-api-server
        uses: docker/build-push-action@v5
        with:
          context: ./api-server
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/api-server:latest

  # This job will be responsible for deploying the services
  # It will run after the build-and-push job is successful
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production # Or staging, depending on the environment
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to production (Placeholder)
        run: |
          echo "Deployment logic goes here."
          echo "This could involve kubectl, AWS CLI, GCP CLI, or a custom deployment script."
          echo "Images: ghcr.io/${{ github.repository_owner }}/alpha-memory-service:latest, ghcr.io/${{ github.repository_owner }}/api-server:latest"
          # Example: kubectl apply -f kubernetes-manifests.yaml
          # Or: aws ecs update-service --cluster my-cluster --service my-service --force-new-deployment
